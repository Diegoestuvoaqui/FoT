[env:uno]
platform = atmelavr
board = uno
framework = arduino
build_src_filter = +<firmware/**/*.cpp>
build_flags = -Isrc/firmware
lib_deps =
    adafruit/DHT sensor library @ ^1.4.6

; Test de integración física — se sube al UNO y se lee por Serial Monitor
; No es un test Unity, es un sketch manual
[env:test_sensors]
platform = atmelavr
board = uno
framework = arduino
build_src_filter =
    +<test/sensors_test.cpp>
    +<firmware/**/*.cpp>
build_flags =
    -Isrc/firmware
    -Isrc/firmware/abstractSensors
lib_deps =
    adafruit/DHT sensor library @ ^1.4.6

; Test Unity de la FSM — corre en el host, sin hardware
[env:test_fsm]
platform = native
test_framework = unity
build_flags =
    -Isrc/firmware
    -Isrc/firmware/stateMachine
    -Isrc/firmware/abstractSensors
    -Itest/mocks
    -Iinclude
build_src_filter =
    +<firmware/stateMachine/**/*.cpp>
    -<firmware/abstractSensors/**/*.cpp>